name: clinical-triage-env
version: 1.0.0
description: Medical triage RL environment with multi-task grading.

tasks:
  easy:
    grader: evaluation.graders:grade_easy
  medium:
    grader: evaluation.graders:grade_medium
  hard:
    grader: evaluation.graders:grade_hard

endpoints:
  health: GET /health
  reset: POST /reset
  step: POST /step
  state: GET /state
